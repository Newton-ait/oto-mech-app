name: OTO-Mech CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx tsc --noEmit

  build-android-preview:
    name: Build Android (Preview APK)
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm install
      - name: Write Firebase files
        env:
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          echo "$GOOGLE_SERVICES" > google-services.json
          echo "$GOOGLE_PLIST" > GoogleService-Info.plist
          python3 -c "import json,sys; json.load(open('google-services.json'))" && echo "✅ JSON valid" || echo "❌ JSON malformed"
      - name: Allow Firebase files in EAS upload
        run: |
          sed -i '/google-services.json/d' .gitignore
          sed -i '/GoogleService-Info.plist/d' .gitignore
      - name: Build Android preview APK
        run: eas build --platform android --profile preview --non-interactive
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}

  build-android-production:
    name: Build Android (Production AAB)
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: npm install
      - name: Write Firebase files
        env:
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          echo "$GOOGLE_SERVICES" > google-services.json
          echo "$GOOGLE_PLIST" > GoogleService-Info.plist
          python3 -c "import json,sys; json.load(open('google-services.json'))" && echo "✅ JSON valid" || echo "❌ JSON malformed"
      - name: Write Google Play key
        env:
          PLAY_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: echo "$PLAY_KEY" > google-play-key.json
      - name: Allow Firebase files in EAS upload
        run: |
          sed -i '/google-services.json/d' .gitignore
          sed -i '/GoogleService-Info.plist/d' .gitignore
      - name: Build Android production AAB
        run: eas build --platform android --profile production --non-interactive
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
      - name: Build complete
        run: echo "✅ AAB built. Download from https://expo.dev/accounts/newtonait/projects/oto-mech/builds — upload manually to Play Console until app is registered."
        # Play Store auto-upload is disabled until app is created in Google Play Console.
        # Once the app is registered at https://play.google.com/console, re-enable by adding:
        # - uses: r0adkll/upload-google-play@v1 (see git history for config)
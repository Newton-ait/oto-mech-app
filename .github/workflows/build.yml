name: OTO-Mech CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx tsc --noEmit

  build-android-preview:
    name: Build Android (Preview APK)
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm install

      # Use printf to safely write JSON (avoids echo mangling special chars)
      - name: Write google-services.json
        run: printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Write GoogleService-Info.plist
        run: printf '%s' '${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}' > GoogleService-Info.plist

      - name: Verify Firebase files
        run: |
          echo "=== google-services.json ==="
          cat google-services.json | python3 -m json.tool --no-indent | head -5
          echo "=== GoogleService-Info.plist (first 3 lines) ==="
          head -3 GoogleService-Info.plist

      # Remove from .gitignore so EAS includes them in upload zip
      - name: Allow Firebase files in EAS upload
        run: |
          sed -i '/google-services.json/d' .gitignore
          sed -i '/GoogleService-Info.plist/d' .gitignore

      - name: Build Android preview APK
        run: eas build --platform android --profile preview --non-interactive
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}

  build-android-production:
    name: Build & Deploy Android (Production)
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm install

      - name: Write google-services.json
        run: printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Write GoogleService-Info.plist
        run: printf '%s' '${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}' > GoogleService-Info.plist

      - name: Write Google Play key
        run: printf '%s' '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > google-play-key.json

      - name: Allow Firebase files in EAS upload
        run: |
          sed -i '/google-services.json/d' .gitignore
          sed -i '/GoogleService-Info.plist/d' .gitignore

      - name: Build Android production AAB
        run: eas build --platform android --profile production --non-interactive
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}

      - name: Download AAB artifact
        run: |
          BUILD_URL=$(eas build:list --platform android --status finished --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          curl -L "$BUILD_URL" -o app-release.aab

      - name: Upload to Google Play Internal Track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.otomech.app
          releaseFiles: app-release.aab
          track: internal
          status: completed
          releaseName: "OTO-Mech ${{ github.run_number }}"